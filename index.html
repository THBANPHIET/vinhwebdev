<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Web Tối Ưu Chi Phí</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --yellow-glow: #eab308;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header / Thanh điều hướng */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Container chính */
        .container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        /* Khối nội dung bên trái */
        .content-section h1 {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .content-section h1 span {
            color: var(--yellow-glow);
            position: relative;
        }

        .content-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            max-width: 500px;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            border: 1px solid var(--text-muted);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Khối hiển thị hình ảnh bên phải (Giả lập khung Short/Reels) */
        .image-section {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .image-wrapper {
            position: relative;
            max-width: 360px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(59, 130, 246, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.5s ease;
        }

        .image-wrapper:hover {
            transform: scale(1.02) rotate(1deg);
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Hiệu ứng trang trí phía sau ảnh */
        .image-section::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(120px);
            opacity: 0.3;
            top: 10%;
            right: 10%;
            z-index: -1;
        }

        /* Responsive cho thiết bị di động */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
                margin: 2rem auto;
                gap: 3rem;
            }

            .content-section h1 {
                font-size: 2.2rem;
            }

            .content-section p {
                margin: 0 auto 2rem auto;
            }

            .cta-buttons {
                justify-content: center;
            }

            .image-wrapper {
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">AI.WebSpace</div>
    </header>

    <main class="container">
        <section class="content-section">
            <h1>Có AI Web có rẻ hơn không? <br>Câu trả lời là <span>CÓ!</span></h1>
            <p>Tối ưu hóa quy trình vận hành và xây dựng sản phẩm công nghệ với chi phí tiết kiệm nhất bằng các giải pháp AI thế hệ mới.</p>
            <div class="cta-buttons">
                <a href="#" class="btn btn-primary">Khám phá ngay</a>
                <a href="#" class="btn btn-secondary">Xem bảng giá</a>
            </div>
        </section>

        <section class="image-section">
            <div class="image-wrapper">
                <img src="image_a33a5e.jpg" alt="AI Web rẻ hơn không? Có!">
            </div>
        </section>
    </main>

</body>
</html>
